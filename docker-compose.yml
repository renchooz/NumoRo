services:

  server:
    build: ./server
    container_name: namo-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"

  client:
    build: ./client
    container_name: namo-client
    restart: unless-stopped
    env_file:
      - ./client/.env
    ports:
      - "5173:80"
    depends_on:
      - server        
  